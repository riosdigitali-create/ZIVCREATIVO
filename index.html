const ATTR = (() => {
  const p = new URLSearchParams(location.search);

    utm_source:   g("utm_source"),

  // se guarda por si el usuario recarga o navega antes de convertir
  try{
    const prev = JSON.parse(sessionStorage.getItem("ziv_attr") || "{}");
    const merged = Object.assign({}, prev, Object.fromEntries(Object.entries(a).filter(([,v]) => v)));
    sessionStorage.setItem("ziv_attr", JSON.stringify(merged));

})();

/* ============================================================
   ARTE HD — personajes y objetos dibujados con vectores:
   degradados, luz volumétrica y sombras suaves. La física NO
   cambia: cada figura vive en la MISMA caja del sprite anterior.
   ============================================================ */
const rnd = (a,b) => a + Math.random()*(b-a);

function rr(ctx, x, y, w, h, r){
  const q = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+q, y);
  ctx.arcTo(x+w, y,   x+w, y+h, q);
  ctx.arcTo(x+w, y+h, x,   y+h, q);
  ctx.arcTo(x,   y+h, x,   y,   q);
  ctx.arcTo(x,   y,   x+w, y,   q);
  ctx.closePath();
}

/* HÉROE: GORILA ZIV — caja de 12u × 16u (u = escala), pies en py+16u.
   pose: "idle" | "walk" | "jump" */
function drawHero(ctx, px, py, u, flip, pose, t){
  const cx = px + 6*u, feet = py + 16*u;
  const walk = Math.sin(t*0.35);
  const bob  = pose==="idle" ? Math.sin(t*0.08)*0.22*u : 0;
  const inAir = pose==="jump";

  ctx.save();
  ctx.translate(cx, feet);
  if(flip) ctx.scale(-1,1);
  ctx.lineJoin = "round";
  const O = "rgba(20,10,5,.4)", lw = 0.5*u;
  const FUR1 = "#6B4A33", FUR2 = "#4A3020", FUR3 = "#382417";
  const SKIN = "#E9C79E", SKIN2 = "#C79E72";

  /* piernas cortas y macizas + pies */
  const legSwing = pose==="walk" ? walk*1.3*u : 0;
  ctx.fillStyle = FUR2;
  if(inAir){
    rr(ctx, -3.9*u, -5.4*u, 3.2*u, 4.2*u, 1.5*u); ctx.fill();
    rr(ctx,  0.7*u, -5.4*u, 3.2*u, 4.2*u, 1.5*u); ctx.fill();
  } else {
    rr(ctx, -3.9*u + legSwing*0.3, -5.6*u, 3.2*u, 5.6*u, 1.5*u); ctx.fill();
    rr(ctx,  0.7*u - legSwing*0.3, -5.6*u, 3.2*u, 5.6*u, 1.5*u); ctx.fill();
  }
  ctx.fillStyle = FUR3;
  const fy = inAir ? -1.6*u : 0;
  rr(ctx, -4.3*u + legSwing*0.3, fy-1.7*u, 4.0*u, 1.7*u, 0.85*u); ctx.fill();
  rr(ctx,  0.3*u - legSwing*0.3, fy-1.7*u, 4.0*u, 1.7*u, 0.85*u); ctx.fill();

  /* torso de barril con degradado */
  const ty = -12.6*u + bob;
  let g = ctx.createLinearGradient(0, ty, 0, ty+8.6*u);
  g.addColorStop(0, FUR1); g.addColorStop(1, FUR2);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(0, ty+4.4*u, 5.4*u, 4.9*u, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = O; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.ellipse(0, ty+4.4*u, 5.4*u, 4.9*u, 0, 0, 7); ctx.stroke();
  /* pecho de piel */
  g = ctx.createLinearGradient(0, ty+1.5*u, 0, ty+8*u);
  g.addColorStop(0, SKIN); g.addColorStop(1, SKIN2);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(0, ty+5.0*u, 3.4*u, 3.4*u, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = "rgba(120,70,30,.3)"; ctx.lineWidth = 0.3*u;
  ctx.beginPath(); ctx.moveTo(0, ty+3.6*u); ctx.lineTo(0, ty+7.4*u); ctx.stroke();

  /* brazos poderosos: nudillos al piso (o arriba en el salto) */
  const armSwing = pose==="walk" ? walk*1.6*u : 0;
  function brazo(side, sw){
    const sx = side*4.6*u;
    ctx.fillStyle = FUR1;
    if(inAir){
      ctx.beginPath();
      ctx.moveTo(sx - side*1.6*u, ty+2.2*u);
      ctx.quadraticCurveTo(side*8.4*u, ty+0.4*u, side*7.6*u, ty-3.4*u);
      ctx.lineTo(side*5.4*u, ty-4.2*u);
      ctx.quadraticCurveTo(side*5.6*u, ty+0.2*u, sx - side*1.2*u, ty+3.6*u);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = FUR3;
      ctx.beginPath(); ctx.arc(side*6.6*u, ty-4.0*u, 1.7*u, 0, 7); ctx.fill();
      ctx.fillStyle = SKIN2;
      ctx.beginPath(); ctx.arc(side*6.6*u, ty-4.3*u, 0.9*u, 0, 7); ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(sx - side*1.8*u, ty+1.6*u);
      ctx.quadraticCurveTo(side*8.6*u, ty+3.2*u, side*7.0*u + sw, -2.4*u);
      ctx.lineTo(side*4.6*u + sw, -2.0*u);
      ctx.quadraticCurveTo(side*4.8*u, ty+4.6*u, sx - side*1.0*u, ty+4.4*u);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = FUR3;
      ctx.beginPath(); ctx.arc(side*5.9*u + sw, -1.8*u, 1.9*u, 0, 7); ctx.fill();
      ctx.fillStyle = SKIN2;
      rr(ctx, side*5.9*u + sw - 1.3*u, -2.7*u, 2.6*u, 1.1*u, 0.55*u); ctx.fill();
    }
  }
  brazo(-1, -armSwing*0.4);
  brazo( 1,  armSwing*0.4);

  /* cabeza */
  const hy = -14.2*u + bob;
  g = ctx.createRadialGradient(-1.2*u, hy-1.4*u, 0.6*u, 0, hy, 4.4*u);
  g.addColorStop(0, "#7D5940"); g.addColorStop(1, FUR2);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, hy, 3.9*u, 0, 7); ctx.fill();
  ctx.strokeStyle = O; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.arc(0, hy, 3.9*u, 0, 7); ctx.stroke();
  /* cara de piel */
  ctx.fillStyle = SKIN;
  ctx.beginPath(); ctx.ellipse(0.5*u, hy+0.9*u, 3.0*u, 2.5*u, 0, 0, 7); ctx.fill();
  /* ceño de pelaje */
  ctx.fillStyle = FUR2;
  rr(ctx, -2.6*u, hy-2.1*u, 6.4*u, 1.6*u, 0.8*u); ctx.fill();

  /* ojos con parpadeo */
  const blink = (t % 190) < 6;
  if(!blink){
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.ellipse(0.6*u, hy-0.3*u, 0.95*u, 1.1*u, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(2.7*u, hy-0.3*u, 0.95*u, 1.1*u, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#2A1B10";
    ctx.beginPath(); ctx.arc(0.95*u, hy-0.2*u, 0.5*u, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(3.0*u, hy-0.2*u, 0.5*u, 0, 7); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(0.75*u, hy-0.45*u, 0.2*u, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(2.8*u, hy-0.45*u, 0.2*u, 0, 7); ctx.fill();
  } else {
    ctx.strokeStyle = "#7A5A38"; ctx.lineWidth = 0.4*u; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(0.1*u, hy-0.2*u); ctx.lineTo(1.2*u, hy-0.2*u); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2.2*u, hy-0.2*u); ctx.lineTo(3.3*u, hy-0.2*u); ctx.stroke();
  }
  /* nariz y sonrisa */
  ctx.fillStyle = "#8A5F3D";
  ctx.beginPath(); ctx.ellipse(1.2*u, hy+1.2*u, 0.42*u, 0.3*u, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.4*u, hy+1.2*u, 0.42*u, 0.3*u, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = "#7A4A28"; ctx.lineWidth = 0.42*u; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(1.8*u, hy+1.9*u, 1.05*u, 0.3, Math.PI-0.6); ctx.stroke();

  /* gorra dorada con Z (la marca) */
  g = ctx.createLinearGradient(0, hy-5.6*u, 0, hy-2.2*u);
  g.addColorStop(0,"#FFDF66"); g.addColorStop(1,"#F09A00");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0.2*u, hy-2.6*u, 3.0*u, Math.PI, 0); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = O; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.arc(0.2*u, hy-2.6*u, 3.0*u, Math.PI, 0); ctx.stroke();
  ctx.fillStyle = "#D98700";
  rr(ctx, 1.4*u, hy-3.3*u, 3.6*u, 1.0*u, 0.5*u); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.4)";
  ctx.beginPath(); ctx.ellipse(-1.0*u, hy-4.3*u, 1.2*u, 0.55*u, -0.5, 0, 7); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(0.1*u, hy-3.8*u, 1.05*u, 0, 7); ctx.fill();
  ctx.fillStyle = "#1B2A6B";
  ctx.font = "bold " + (1.7*u) + "px monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("Z", 0.1*u, hy-3.7*u);

  ctx.restore();
}

/* ORBE DE PODER — la mejora final (misma caja del hongo: 24×20) */
function drawOrbe(ctx, x, y, t){
  const cx = x+12, cy = y+10, R = 10;
  const pulse = Math.sin(t*0.12)*0.5+0.5;
  let g = ctx.createRadialGradient(cx,cy,2, cx,cy, R*2.4);
  g.addColorStop(0, "rgba(255,214,80," + (0.5+pulse*0.3) + ")");
  g.addColorStop(1, "rgba(255,214,80,0)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx,cy,R*2.4,0,7); ctx.fill();
  g = ctx.createRadialGradient(cx-3.5, cy-4, 1, cx, cy, R);
  g.addColorStop(0,"#FFFDF2"); g.addColorStop(.35,"#FFD84D");
  g.addColorStop(.8,"#F09A00"); g.addColorStop(1,"#C46A00");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.55)"; ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.arc(cx,cy,R-1.2,0,7); ctx.stroke();
  ctx.fillStyle = "#7A3E00";
  ctx.font = "bold 11px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("Z", cx, cy+0.5);
  for(let i=0;i<2;i++){
    const a = t*0.06 + i*Math.PI;
    const sx = cx + Math.cos(a)*(R+4), sy = cy + Math.sin(a)*(R+4)*0.5 - 2;
    ctx.fillStyle = "rgba(255,255,255," + (0.5+pulse*0.4) + ")";
    ctx.beginPath();
    ctx.moveTo(sx, sy-2.2); ctx.lineTo(sx+1.4, sy); ctx.lineTo(sx, sy+2.2); ctx.lineTo(sx-1.4, sy);
    ctx.closePath(); ctx.fill();
  }
}

/* CAPARAZÓN CON PICOS "SITIO LENTO" — 20 de ancho, pegado al piso */
function drawSnailHD(ctx, x, groundY, dir, t){
  ctx.save();
  ctx.translate(x+10, groundY);
  if(dir<0) ctx.scale(-1,1);
  /* sombra (fija, sin girar) */
  ctx.fillStyle = "rgba(0,0,0,.28)";
  ctx.beginPath(); ctx.ellipse(0, -0.3, 10.5, 2.1, 0, 0, 7); ctx.fill();
  /* meneo al deslizarse */
  ctx.rotate(Math.sin(t*0.2)*0.06);
  /* base cremosa */
  let g = ctx.createLinearGradient(0,-4.4,0,-0.6);
  g.addColorStop(0,"#FFF3D8"); g.addColorStop(1,"#D9B87E");
  ctx.fillStyle = g;
  rr(ctx, -9.6, -3.9, 19.2, 3.4, 1.7); ctx.fill();
  ctx.strokeStyle = "rgba(90,60,10,.5)"; ctx.lineWidth = 0.7;
  rr(ctx, -9.6, -3.9, 19.2, 3.4, 1.7); ctx.stroke();
  /* domo esmeralda */
  g = ctx.createRadialGradient(-3,-9,1, 0,-6.5,10.5);
  g.addColorStop(0,"#7BE887"); g.addColorStop(.55,"#2FB84A"); g.addColorStop(1,"#177A2E");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(-9.4,-3.6);
  ctx.quadraticCurveTo(-10,-11.5, 0,-12);
  ctx.quadraticCurveTo(10,-11.5, 9.4,-3.6);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "rgba(10,70,25,.6)"; ctx.lineWidth = 0.8;
  ctx.stroke();
  /* placas del caparazón */
  ctx.strokeStyle = "rgba(10,70,25,.45)"; ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(-6.6,-4.2); ctx.quadraticCurveTo(-5.4,-9.6, -2.4,-11.4);
  ctx.moveTo( 6.6,-4.2); ctx.quadraticCurveTo( 5.4,-9.6,  2.4,-11.4);
  ctx.moveTo(-8.6,-7.4); ctx.quadraticCurveTo(0,-9.4, 8.6,-7.4);
  ctx.stroke();
  /* picos de hueso */
  const pico = (bx,by,h,ang)=>{
    ctx.save(); ctx.translate(bx,by); ctx.rotate(ang);
    const pg = ctx.createLinearGradient(0,-h,0,0);
    pg.addColorStop(0,"#FFFFFF"); pg.addColorStop(1,"#C9BFA4");
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.moveTo(-1.6,0); ctx.quadraticCurveTo(-0.4,-h*0.6, 0,-h);
    ctx.quadraticCurveTo(0.4,-h*0.6, 1.6,0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(70,60,30,.45)"; ctx.lineWidth = 0.5; ctx.stroke();
    ctx.restore();
  };
  pico(-5.2,-8.2, 4.6, -0.5);
  pico( 0,-11.6, 5.2, 0);
  pico( 5.2,-8.2, 4.6, 0.5);
  /* brillo */
  ctx.fillStyle = "rgba(255,255,255,.35)";
  ctx.beginPath(); ctx.ellipse(-4.2,-9.2, 2.2, 1.1, -0.5, 0, 7); ctx.fill();
  /* chispas de fricción al frente */
  if(Math.floor(t/3)%2===0){
    ctx.fillStyle = "rgba(255,220,120,.7)";
    ctx.fillRect(8.6, -1.6, 1.1, 1.1);
    ctx.fillRect(9.6, -2.8, 0.9, 0.9);
  }
  ctx.restore();
}

/* ---------- Partículas + shake ---------- */
function makeFX(){
  const parts = [];
  let shake = 0;
  return {
    burst(x, y, cols, n=14, spd=3){
      for(let i=0;i<n;i++){
        const a = Math.random()*Math.PI*2, s = rnd(spd*0.3, spd);
        parts.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 1,
          life:rnd(22,44), size:rnd(2,4), col:cols[Math.floor(Math.random()*cols.length)] });
      }
    },
    text(x, y, str, col="#FFD400", size=8){
      parts.push({ x, y, vx:0, vy:-0.8, life:55, txt:str, col, size });
    },
    shake(n){ shake = Math.max(shake, n); },
    offset(){
      if(shake < 0.4) return [0,0];
      return [rnd(-shake,shake), rnd(-shake,shake)];
    },
    update(){
      shake *= 0.82;
      for(let i=parts.length-1;i>=0;i--){
        const p = parts[i];
        p.x += p.vx; p.y += p.vy;
        if(!p.txt) p.vy += 0.12;
        p.life--;
        if(p.life <= 0) parts.splice(i,1);
      }
    },
    draw(ctx){
      parts.forEach(p => {
        const a = Math.min(1, p.life/20);
        ctx.globalAlpha = a;
        if(p.txt){
          ctx.font = p.size + "px 'Press Start 2P', monospace";
          ctx.textAlign = "center";
          ctx.lineJoin = "round";
          ctx.strokeStyle = "rgba(0,0,0,.65)"; ctx.lineWidth = 3;
          ctx.strokeText(p.txt, p.x, p.y);
          ctx.fillStyle = p.col;
          ctx.fillText(p.txt, p.x, p.y);
        } else {
          ctx.shadowColor = p.col; ctx.shadowBlur = 6;
          ctx.fillStyle = p.col;
          ctx.beginPath();
          ctx.arc(p.x + p.size/2, p.y + p.size/2, p.size*0.6, 0, 7);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;
      });
    }
  };
}

/* ---------- Audio + música adaptativa ---------- */
const audio = {
  ctx: null, muted:false,
  init(){ if(!this.ctx) try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} },
  tone(freq, dur, type="square", vol=0.06, when=0){
    if(!this.ctx) return;
    const t = this.ctx.currentTime + when;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + dur);
  },
  sfx(fn){ if(!this.muted) fn(); },
  jump(){ this.sfx(()=>{ this.tone(320,.08); this.tone(480,.1,"square",.06,.06); }); },
  bump(){ this.sfx(()=>this.tone(140,.1,"triangle",.09)); },
  bad(){ this.sfx(()=>{ this.tone(200,.12,"sawtooth",.05); this.tone(120,.16,"sawtooth",.05,.08); }); },
  coin(){ this.sfx(()=>{ this.tone(988,.06,"square",.05); this.tone(1319,.14,"square",.05,.06); }); },
  spawn(){ this.sfx(()=>[523,659,784,1046].forEach((f,i)=>this.tone(f,.09,"square",.05,i*.07))); },
  blip(){ this.sfx(()=>this.tone(880,.05,"square",.04)); },
  ping(){ this.sfx(()=>this.tone(1200,.05,"sine",.045)); },
  zap(){ this.sfx(()=>{ this.tone(1600,.05,"square",.05); this.tone(2200,.06,"square",.04,.04); }); },
  thunder(){ this.sfx(()=>{ this.tone(80,.5,"sawtooth",.08); this.tone(55,.7,"sawtooth",.06,.1); }); },
  build(){ this.sfx(()=>{ this.tone(220,.09,"triangle",.07); this.tone(330,.1,"triangle",.06,.08); this.tone(440,.12,"triangle",.06,.16); }); },
  whoosh(){ this.sfx(()=>{ this.tone(300,.14,"sine",.05); this.tone(700,.16,"sine",.045,.06); }); },
  levelup(){ this.sfx(()=>[659,784,988,1319].forEach((f,i)=>this.tone(f,.12,"square",.05,i*.09))); },
  power(){ this.sfx(()=>[392,523,659,784,1046,1318].forEach((f,i)=>this.tone(f,.11,"square",.05,i*.08))); },
  fanfare(){ this.sfx(()=>[523,523,523,659,784,784,1046].forEach((f,i)=>this.tone(f,.14,"square",.055,i*.12))); }
};

const music = {
  timer:null, step:0, world:"sec-web",
  patterns:{
    "sec-web": { lead:[523,659,784,659,880,784,659,523], bass:[131,131,165,196], ms:170 }
  },
  start(){
    if(this.timer || !audio.ctx) return;
    const self = this;
    function schedule(){
      self.timer = setInterval(()=>{
        if(audio.muted) return;
        const p = self.patterns[self.world] || self.patterns["sec-web"];
        const s = self.step % 8;
        audio.tone(p.lead[s], .09, "square", .018);
        if(s % 2 === 0) audio.tone(p.bass[(self.step/2)%4|0], .16, "triangle", .028);
        self.step++;
      }, self.patterns[self.world].ms);
    }
    schedule();
  },
  setWorld(w){
    this.world = w;
    if(this.timer){ clearInterval(this.timer); this.timer = null; this.start(); }
  }
};

   y avisa en vivo si el CRM está abierto en otra pestaña.

const CRM_KEY = "ziv_crm_v1";

function scoreLead(a){
  let s = 20;
  if(a.whatsapp) s += 25;
  if(a.giro) s += 8;
  if(a.productos) s += 8;
  if(/s[ií]/i.test(a.dominio || "")) s += 12;
  if(/s[ií]/i.test(a.logo || "")) s += 5;
  if(fuenteDeLead() === "Meta Ads") s += 10;
  return Math.min(100, s);
}

function saveToLocalCRM(answers){

      productos: answers.productos  || "",
      logo:      answers.logo       || "",
      dominio:   (answers.dominio || "") + (answers.dominioCual ? " (" + answers.dominioCual + ")" : ""),
      valor:     0,
      responsable: (db.cfg && db.cfg.equipo && db.cfg.equipo[0]) || "Ismael",
      fuente:    fuenteDeLead(),
      campania:  campaniaDeLead(),
      utm:       ATTR,
      notas:     "Llegó jugando el Super Web Quest. Completó las 3 mejoras.",
      actividad: [{ fecha: now, texto: "🎮 Lead capturado en Super Web Quest", por: "Landing" }],

    // aviso en vivo al CRM si está abierto
    try{ new BroadcastChannel("ziv_crm").postMessage("sync"); }catch(e){}
    return lead;
  }catch(e){ return null; }
}

/* ---------- Formulario por diálogos ---------- */
function runForm(overlay, levelName, questions, onDone){
  const answers = {};
  function show(i){
    const q = questions[i];
    const total = questions.length;
    const bar = "▮".repeat(i) + "▯".repeat(total - i);
    let inputHTML = "";
    if(q.type === "radio"){
      inputHTML = `<div class="radio-row">` +
        q.opts.map(o => `<button type="button" class="radio-opt" data-v="${o}">${o}</button>`).join("") + `</div>`;
      if(q.follow) inputHTML += `<input class="q-input" id="qFollow" style="display:none" placeholder="${q.follow.ph}" autocomplete="off">`;
    } else {
      const t = q.type === "tel" ? "tel" : q.type === "email" ? "email" : "text";
      inputHTML = `<input class="q-input" id="qInput" type="${t}" placeholder="${q.ph||''}" autocomplete="off">`;
    }
    overlay.innerHTML = `
      <div class="dialog">
        <div class="progress">${levelName} · PREGUNTA ${i+1}/${total}<br><span class="bar">${bar}</span></div>
        <div class="q-label">${q.label}</div>
        ${inputHTML}
        <div class="err" id="qErr"></div>
        <button class="btn" id="qNext">${i === total-1 ? "ENVIAR ▶" : "SIGUIENTE ▶"}</button>
      </div>`;
    let radioVal = null;
    if(q.type === "radio"){
      overlay.querySelectorAll('.radio-opt').forEach(b => {
        b.addEventListener('click', () => {
          overlay.querySelectorAll('.radio-opt').forEach(x => x.classList.remove('sel'));
          b.classList.add('sel');
          radioVal = b.dataset.v;
          audio.blip();
          const f = overlay.querySelector('#qFollow');
          if(f) f.style.display = (q.follow && radioVal === q.follow.when) ? "block" : "none";
        });
      });
    } else {
      const inp = overlay.querySelector('#qInput');
      setTimeout(() => inp.focus(), 60);
      inp.addEventListener('keydown', e => { if(e.key === "Enter") next(); });
    }
    function fail(msg){
      const e = overlay.querySelector('#qErr');
      e.textContent = msg; e.style.display = "block";
      audio.bump();
    }
    function next(){
      let val;
      if(q.type === "radio"){
        if(!radioVal) return fail("¡Elige una opción para continuar!");
        val = radioVal;
        const f = overlay.querySelector('#qFollow');
        if(f && f.style.display !== "none" && f.value.trim()) answers[q.follow.key] = f.value.trim();
      } else {
        val = overlay.querySelector('#qInput').value.trim();
        if(!val) return fail("¡Este campo es tu llave al siguiente nivel!");
        if(q.type === "tel"){
          const digits = val.replace(/\D/g,"");
          if(digits.length < 10) return fail("Necesito al menos 10 dígitos 📱");
          val = digits;
        }
        if(q.type === "email" && !/^\S+@\S+\.\S+$/.test(val)) return fail("Mmm... ese correo no se ve válido 📧");
      }
      answers[q.key] = val;
      audio.blip();
      addXP(8);
      if(i + 1 < questions.length) show(i + 1);
      else { overlay.innerHTML = ""; onDone(answers); }
    }
    overlay.querySelector('#qNext').addEventListener('click', next);
  }
  show(0);
}

/* ============================================================
   LIENZO NÍTIDO
   Antes: el juego se dibujaba en 270px de alto y el navegador
   lo estiraba a la pantalla. Los sprites (bloques sólidos) aguantaban,
   pero las LETRAS salían borrosas: se suavizaban en chiquito y luego
   se ampliaban 3x, convirtiendo los bordes grises en manchas.

   Ahora: el lienzo se crea a la resolución REAL de tu pantalla y
   escalamos el CONTEXTO (no la imagen). El juego se sigue dibujando
   en las mismas coordenadas, pero el texto se renderiza nítido.
   ============================================================ */
function fitCanvas(sec, cv){
  const r = sec.getBoundingClientRect();
  const ar = r.width / Math.max(1, r.height);
  let W, H;
  if(ar >= 1){ H = 270; W = Math.round(270 * ar); }
  else { W = 360; H = Math.round(360 / ar); }

  /* Píxeles REALES de pantalla por cada píxel del juego.
     Exacto (no redondeado) para que el navegador NO tenga que reescalar
     la imagen: es ahí donde se ensuciaban las letras. */
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const S = Math.max(1, Math.min(8, (r.height * dpr) / H)) || 1;

  cv.width  = Math.round(W * S);
  cv.height = Math.round(H * S);
  cv._S = S;

  const ctx = cv.getContext('2d');
  ctx.setTransform(S, 0, 0, S, 0, 0);   // el juego sigue dibujando en coordenadas normales
  ctx.imageSmoothingEnabled = true;     // render HD: formas suaves, sin dientes
  return { W, H, S };
}
function canvasPos(cv, e){
  const r = cv.getBoundingClientRect();
  const S = cv._S || 1;
  return {
    x:(e.clientX - r.left)/r.width  * cv.width  / S,
    y:(e.clientY - r.top) /r.height * cv.height / S
  };
}

/* ============================================================
   MUNDO 1 · SUPER WEB QUEST
   3 cajas sorpresa (mejoras) + obstáculo "sitio lento"
   ============================================================ */
const GameWeb = (() => {
  const sec = document.getElementById('sec-web');
  const cv = sec.querySelector('canvas');
  const ctx = cv.getContext('2d');
  const overlay = sec.querySelector('.overlay');
  const touch = sec.querySelector('.touch');
  const fx = makeFX();

  let W = 480, H = 270, GROUND = 232;
  const S = 2;
  let state = "TITLE";
  let ticks = 0, growTimer = 0, finaleShroom = null;
  let prevOnGround = true;
  let hitCooldown = 0;
  let lastAnswers = {};

  const FEATURES = ["✨ DISEÑO PREMIUM", "🔍 SEO", "💬 CHAT EN VIVO"];
  const blocks = [
    { fx:0.34, fy:94,  used:false, bump:0 },
    { fx:0.54, fy:112, used:false, bump:0 },
    { fx:0.74, fy:94,  used:false, bump:0 }
  ];
  let upgrades = 0;

  const player = { x:60, y:0, w:24, h:32, vx:0, vy:0, onGround:true, facing:1, frame:0, big:false, visible:true };
  const shroom = { active:false, x:0, y:0, vx:0, vy:0, rising:0, landed:false };
  const snail = { fxa:0.12, fxb:0.28, x:0, min:0, max:0, dir:1 };
  let coins = [
    { fx:0.24, fy:64,  got:false },
    { fx:0.9,  fy:60,  got:false }
  ];

  function resize(){
    ({W, H} = fitCanvas(sec, cv));

    /* La barda de tabique es la ZONA DE CONTROL en celular:
       la hacemos lo bastante alta para que los botones quepan DENTRO de ella,
       debajo del suelo. Así el dedo nunca tapa al muñeco. */
    const secH = Math.max(1, sec.clientHeight);
    let banda = 38;                                  // escritorio: barda normal
    if(isCoarse){
      const px2u  = H / secH;                        // px de pantalla -> unidades del canvas
      const minU  = Math.ceil(108 * px2u);           // mínimo 108px reales: cabe el botón de salto (74px)
      banda = Math.max(minU, Math.round(H * 0.13));
      banda = Math.min(banda, Math.round(H * 0.30)); // pero que no se coma la pantalla
    }
    GROUND = H - banda;
    sec.style.setProperty('--band', Math.round(banda / (H / secH)) + 'px');

    blocks.forEach(b => { b.x = Math.round(W*b.fx) - 16; b.y = GROUND - b.fy; });
    snail.min = W*snail.fxa; snail.max = W*snail.fxb;
    if(snail.x === 0) snail.x = snail.min;
    snail.x = Math.max(snail.min, Math.min(snail.max, snail.x));
    player.x = Math.min(player.x, W - player.w - 4);
    if(player.onGround) player.y = GROUND - player.h;
    coins.forEach(c => { c.x = W*c.fx; c.y = GROUND - c.fy; });
  }

  function bindTouch(cls, key){
    const el = touch.querySelector('.' + cls);
    el.addEventListener('pointerdown', e => { e.preventDefault(); keys[key] = true; });
    el.addEventListener('pointerup',   e => { e.preventDefault(); keys[key] = false; });
    el.addEventListener('pointerleave',e => { keys[key] = false; });
  }
  bindTouch('tLeft','arrowleft');
  bindTouch('tRight','arrowright');
  bindTouch('tJump',' ');

  sec.addEventListener('pointerdown', e => {
    if(state === "TITLE" && !e.target.closest('.scrollHint')) start();
  });
  function onAnyKey(){ if(state === "TITLE") start(); }
  function start(){
    audio.init(); audio.blip(); music.start();
    state = "PLAY";
    touch.classList.add('on');
  }

  function update(){
    ticks++;
    fx.update();
    if(hitCooldown > 0) hitCooldown--;

    if(state === "PLAY" || state === "FINALE" || state === "DONE"){
      if(state === "PLAY" || state === "DONE"){
        let mv = 0;
        if(keys['arrowleft'] || keys['a']) mv = -1;
        if(keys['arrowright'] || keys['d']) mv = 1;
        player.vx = mv * 2.2;
        if(mv !== 0) player.facing = mv;
        const wantJump = keys[' '] || keys['arrowup'] || keys['w'];
        if(wantJump && player.onGround){
          player.vy = -8.6; player.onGround = false;
          audio.jump();
          fx.burst(player.x + player.w/2, player.y + player.h, ["#c9a06a","#e0c39a"], 6, 1.6);
          unlock("salto","🦘","¡Primer salto!","Ya dominas los controles", 10);
        }
      } else player.vx = 0;

      player.x += player.vx;
      player.vy += 0.5;
      player.y += player.vy;
      player.x = Math.max(4, Math.min(W - player.w - 4, player.x));

      prevOnGround = player.onGround;
      if(player.y + player.h >= GROUND){
        player.y = GROUND - player.h; player.vy = 0; player.onGround = true;
        if(!prevOnGround) fx.burst(player.x + player.w/2, GROUND, ["#c9a06a","#8f4322"], 8, 2);
      }

      // Cajas sorpresa
      blocks.forEach((b, bi) => {
        if(b.bump > 0) b.bump--;
        // golpe de cabeza
        if(!b.used && player.vy < 0 &&
           player.x + player.w > b.x + 4 && player.x < b.x + 32 - 4 &&
           player.y <= b.y + 32 && player.y >= b.y + 32 - 12){
          player.y = b.y + 32; player.vy = 1;
          b.used = true; b.bump = 8;
          upgrades++;
          audio.bump();
          fx.shake(4);
          fx.burst(b.x + 16, b.y, ["#FFD400","#fff","#F5A800"], 18, 3.4);
          fx.text(b.x + 16, b.y - 12, FEATURES[bi]);
          fx.text(b.x + 16, b.y - 26, "¡DESBLOQUEADO!", "#39d98a", 6);
          addXP(15); addCoins(3);
          unlock("pow","💥","¡Primera mejora!","Tu web está subiendo de nivel", 25);
          setTimeout(()=>audio.spawn(), 150);
          if(upgrades === 3){
            unlock("full","🌟","¡WEB COMPLETA!","Diseño + SEO + Chat: nivel premium", 30);
            shroom.active = true; shroom.rising = 20;
            shroom.x = b.x + 4; shroom.y = b.y;
          }
        }
        // pisarla
        if(player.vy >= 0 &&
           player.x + player.w > b.x + 2 && player.x < b.x + 32 - 2 &&
           player.y + player.h >= b.y && player.y + player.h <= b.y + 14){
          player.y = b.y - player.h; player.vy = 0; player.onGround = true;
        }
      });

      // Obstáculo: sitio lento 🐌
      if(state === "PLAY"){
        snail.x += snail.dir * 0.5;
        if(snail.x < snail.min){ snail.x = snail.min; snail.dir = 1; }
        if(snail.x > snail.max){ snail.x = snail.max; snail.dir = -1; }
        const sw = 20, sh = 12;
        if(hitCooldown === 0 &&
           player.x + player.w > snail.x && player.x < snail.x + sw &&
           player.y + player.h > GROUND - sh){
          hitCooldown = 40;
          const push = player.x + player.w/2 < snail.x + sw/2 ? -16 : 16;
          player.x += push;
          player.vy = -3;
          player.onGround = false;
          fx.shake(3);
          fx.text(snail.x + 10, GROUND - 24, "¡SITIO LENTO!", "#ff6b6b", 6);
          audio.bad();
        }
      }

      if(Math.abs(player.vx) > 0 && player.onGround && ticks % 8 === 0) player.frame = 1 - player.frame;

      coins.forEach(c => {
        if(c.got) return;
        if(player.x + player.w > c.x - 6 && player.x < c.x + 12 &&
           player.y + player.h > c.y - 6 && player.y < c.y + 14){
          c.got = true;
          audio.coin();
          addCoins(5); addXP(5);
          fx.burst(c.x, c.y, ["#FFD400","#F5A800","#fff"], 10, 2.6);
          fx.text(c.x, c.y - 6, "+5 🪙");
        }
      });
    }

    if(shroom.active && state === "PLAY"){
      if(shroom.rising > 0){
        shroom.y -= 1; shroom.rising--;
        if(shroom.rising === 0) shroom.vx = 1.1;
      } else if(!shroom.landed){
        shroom.x += shroom.vx;
        let onBlock = false;
        blocks.forEach(b => {
          if(shroom.x + 20 > b.x && shroom.x < b.x + 32 &&
             shroom.y + 20 >= b.y - 2 && shroom.y + 20 <= b.y + 6) onBlock = true;
        });
        if(!onBlock){
          shroom.vy += 0.4; shroom.y += shroom.vy;
          if(shroom.y + 20 >= GROUND){
            shroom.y = GROUND - 20; shroom.vy = 0; shroom.landed = true;
            fx.burst(shroom.x + 12, GROUND, ["#FFF3DC","#E86A2B"], 10, 2.2);
            setTimeout(() => { state = "FROZEN"; showPowerUp(); }, 350);
          }
        }
      }
    }

    if(state === "FINALE" && finaleShroom){
      finaleShroom.vy += 0.4;
      finaleShroom.y += finaleShroom.vy;
      if(finaleShroom.y + 20 >= GROUND){ finaleShroom.y = GROUND - 20; finaleShroom.vy = 0; }
      const t = finaleShroom.x < player.x + player.w && finaleShroom.x + 24 > player.x &&
                finaleShroom.y + 20 >= player.y;
      if(t && growTimer === 0){
        growTimer = 60; finaleShroom = null;
        audio.power();
        fx.shake(5);
        fx.burst(player.x + player.w/2, player.y + 10, ["#fff","#FFD400","#EF3B36","#2EDC6E"], 30, 4);
      }
    }
    if(growTimer > 0){
      growTimer--;
      player.visible = (growTimer % 8 < 4) || growTimer < 20;
      if(growTimer === 30) player.big = true;
      if(growTimer === 0){
        player.visible = true; player.big = true; state = "DONE";
        setTimeout(showFinal, 500);
      }
    }
    if(player.big){
      player.h = 48; player.w = 30;
      if(player.y + player.h > GROUND) player.y = GROUND - player.h;
    }
  }

  function drawSky(){
    const g = ctx.createLinearGradient(0,0,0,GROUND);
    g.addColorStop(0,"#2B6CDF"); g.addColorStop(.45,"#4F9BF2");
    g.addColorStop(.82,"#8ED4FA"); g.addColorStop(1,"#D8F3FF");
    ctx.fillStyle = g; ctx.fillRect(0,0,W,GROUND);
    /* sol con bloom */
    const sx = W*0.84, sy = H*0.14;
    let rg = ctx.createRadialGradient(sx,sy,4, sx,sy,58);
    rg.addColorStop(0,"rgba(255,250,220,.95)");
    rg.addColorStop(.3,"rgba(255,236,150,.5)");
    rg.addColorStop(1,"rgba(255,236,150,0)");
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(sx,sy,58,0,7); ctx.fill();
    rg = ctx.createRadialGradient(sx-4,sy-4,2, sx,sy,15);
    rg.addColorStop(0,"#FFFFF4"); rg.addColorStop(1,"#FFE27A");
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(sx,sy,15,0,7); ctx.fill();
  }
  function drawCloud(x, y, sc=1){
    ctx.save();
    ctx.translate(x,y); ctx.scale(sc,sc);
    const puff = (px,py,r)=>{ ctx.moveTo(px+r,py); ctx.arc(px,py,r,0,7); };
    ctx.fillStyle = "rgba(200,222,248,.9)";
    ctx.beginPath(); puff(1,16,10); puff(15,10,13); puff(31,14,11); puff(42,18,8); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.96)";
    ctx.beginPath(); puff(0,14,10); puff(14,8,13); puff(30,12,11); puff(41,16,8); ctx.fill();
    ctx.fillStyle = "rgba(160,195,235,.4)";
    ctx.beginPath(); ctx.ellipse(20,21,25,5,0,0,7); ctx.fill();
    ctx.restore();
  }
  function drawMountains(){
    /* cordillera lejana con bruma (parallax lento) */
    const off = (ticks*0.05) % (W+200);
    ctx.fillStyle = "rgba(112,158,220,.55)";
    for(let k=-1;k<=1;k++){
      const bx = -off + k*(W+200);
      ctx.beginPath();
      ctx.moveTo(bx-40, GROUND);
      ctx.quadraticCurveTo(bx+W*0.16, GROUND-86, bx+W*0.34, GROUND);
      ctx.moveTo(bx+W*0.28, GROUND);
      ctx.quadraticCurveTo(bx+W*0.5, GROUND-120, bx+W*0.74, GROUND);
      ctx.moveTo(bx+W*0.66, GROUND);
      ctx.quadraticCurveTo(bx+W*0.88, GROUND-70, bx+W*1.1, GROUND);
      ctx.fill();
    }
    /* bruma al pie */
    const hz = ctx.createLinearGradient(0,GROUND-34,0,GROUND);
    hz.addColorStop(0,"rgba(216,243,255,0)");
    hz.addColorStop(1,"rgba(216,243,255,.75)");
    ctx.fillStyle = hz; ctx.fillRect(0,GROUND-34,W,34);
  }
  function drawHill(x,w,h,col){
    const lite = col === "#1E9E2C" ? "#4CCB5C" : "#5BD96B";
    const g = ctx.createLinearGradient(0,GROUND-h,0,GROUND);
    g.addColorStop(0,lite); g.addColorStop(1,col);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(x,GROUND);
    ctx.quadraticCurveTo(x+w*0.5, GROUND-h*2, x+w, GROUND);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.28)";
    ctx.beginPath();
    ctx.ellipse(x+w*0.42, GROUND-h*0.86, w*0.2, h*0.16, -0.25, 0, 7);
    ctx.fill();
    ctx.fillStyle = "rgba(10,60,20,.20)";
    ctx.beginPath();
    ctx.moveTo(x+w*0.62,GROUND);
    ctx.quadraticCurveTo(x+w*0.84, GROUND-h*0.9, x+w, GROUND);
    ctx.closePath(); ctx.fill();
  }
  function drawGround(){
    /* tierra con degradado */
    const g = ctx.createLinearGradient(0,GROUND,0,H);
    g.addColorStop(0,"#9A5530"); g.addColorStop(.35,"#7C4023"); g.addColorStop(1,"#552A14");
    ctx.fillStyle = g; ctx.fillRect(0,GROUND,W,H-GROUND);
    /* piedritas deterministas (no parpadean) */
    ctx.fillStyle = "rgba(0,0,0,.18)";
    for(let y=GROUND+14; y<H; y+=15){
      for(let x=((y*7)%23); x<W; x+=26){
        const r = 1.5 + ((x*13+y*7)%10)/6;
        ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
      }
    }
    ctx.fillStyle = "rgba(255,205,160,.10)";
    for(let y=GROUND+8; y<H; y+=15){
      for(let x=((y*11)%31); x<W; x+=34){
        ctx.beginPath(); ctx.arc(x, y, 1.4, 0, 7); ctx.fill();
      }
    }
    /* pasto con luz de borde */
    const gg = ctx.createLinearGradient(0,GROUND,0,GROUND+9);
    gg.addColorStop(0,"#8CEF57"); gg.addColorStop(1,"#2FA834");
    ctx.fillStyle = gg; ctx.fillRect(0,GROUND,W,9);
    ctx.fillStyle = "rgba(255,255,255,.5)";
    ctx.fillRect(0,GROUND,W,1.5);
    ctx.fillStyle = "rgba(20,80,20,.35)";
    ctx.fillRect(0,GROUND+9,W,1.5);
    /* mechones de pasto */
    ctx.fillStyle = "#5ED14A";
    for(let x=((GROUND*3)%14); x<W; x+=17){
      ctx.beginPath();
      ctx.moveTo(x,GROUND+1); ctx.quadraticCurveTo(x+2,GROUND-4,x+4,GROUND+1);
      ctx.fill();
    }

    /* En celular la barda es la zona de control:
       la oscurecemos un poco y le marcamos el filo para que los botones resalten
       y quede claro que el muñeco camina ARRIBA de esta línea. */
    if(isCoarse && state !== "TITLE"){
      ctx.fillStyle = "rgba(0,0,0,.30)";
      ctx.fillRect(0, GROUND + 3, W, H - GROUND - 3);
      ctx.fillStyle = "#FFD400";
      ctx.fillRect(0, GROUND - 2, W, 2);
    }
  }
  function drawBlock(b){
    const by = b.y - (b.bump > 4 ? (8-b.bump)*2 : b.bump);
    const pulse = Math.sin(ticks*0.09 + b.x)*0.5 + 0.5;
    if(!b.used){
      /* aura dorada */
      const gl = ctx.createRadialGradient(b.x+16, by+16, 6, b.x+16, by+16, 34);
      gl.addColorStop(0, "rgba(255,205,70," + (0.20+pulse*0.18) + ")");
      gl.addColorStop(1, "rgba(255,205,70,0)");
      ctx.fillStyle = gl;
      ctx.beginPath(); ctx.arc(b.x+16, by+16, 34, 0, 7); ctx.fill();
    }
    /* cuerpo */
    let g = ctx.createLinearGradient(0, by, 0, by+32);
    if(b.used){ g.addColorStop(0,"#8B8E9C"); g.addColorStop(1,"#5C5F6E"); }
    else { g.addColorStop(0,"#FFE066"); g.addColorStop(.55,"#F5A800"); g.addColorStop(1,"#D97E00"); }
    ctx.fillStyle = g;
    rr(ctx, b.x, by, 32, 32, 6); ctx.fill();
    ctx.strokeStyle = b.used ? "rgba(20,22,34,.7)" : "rgba(122,62,0,.85)";
    ctx.lineWidth = 2;
    rr(ctx, b.x+1, by+1, 30, 30, 5); ctx.stroke();
    /* bisel superior */
    ctx.fillStyle = "rgba(255,255,255," + (b.used ? ".18" : ".45") + ")";
    rr(ctx, b.x+3, by+3, 26, 7, 4); ctx.fill();
    /* remaches suaves */
    ctx.fillStyle = b.used ? "rgba(20,22,34,.55)" : "rgba(122,62,0,.8)";
    [[7,7],[25,7],[7,25],[25,25]].forEach(([dx,dy])=>{
      ctx.beginPath(); ctx.arc(b.x+dx, by+dy, 1.8, 0, 7); ctx.fill();
    });
    if(!b.used){
      /* barrido de brillo */
      const sweep = ((ticks*0.8) % 90) - 20;
      ctx.save();
      rr(ctx, b.x+2, by+2, 28, 28, 5); ctx.clip();
      const sg = ctx.createLinearGradient(b.x+sweep-10, by, b.x+sweep+10, by+32);
      sg.addColorStop(0,"rgba(255,255,255,0)");
      sg.addColorStop(.5,"rgba(255,255,255,.35)");
      sg.addColorStop(1,"rgba(255,255,255,0)");
      ctx.fillStyle = sg;
      ctx.fillRect(b.x, by, 32, 32);
      ctx.restore();
      /* el "?" flotante con sombra */
      const wob = Math.sin(ticks*0.12 + b.x)*1.4;
      ctx.font = "15px 'Press Start 2P', monospace";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillStyle = "rgba(100,50,0,.55)"; ctx.fillText("?", b.x+17.5, by+18.5+wob);
      ctx.fillStyle = "#fff"; ctx.fillText("?", b.x+16, by+17+wob);
    } else {
      ctx.fillStyle = "rgba(20,22,34,.35)";
      rr(ctx, b.x+10, by+10, 12, 12, 3); ctx.fill();
    }
  }
  function drawFlag(){
    const fxp = W - 40;
    /* montículo */
    ctx.fillStyle = "rgba(30,120,45,.9)";
    ctx.beginPath(); ctx.ellipse(fxp+2, GROUND+2, 22, 7, 0, Math.PI, 0); ctx.fill();
    /* asta metálica */
    let g = ctx.createLinearGradient(fxp,0,fxp+4,0);
    g.addColorStop(0,"#EAF2F8"); g.addColorStop(.5,"#9FB2C2"); g.addColorStop(1,"#5E7080");
    ctx.fillStyle = g; rr(ctx, fxp, GROUND-92, 4, 92, 2); ctx.fill();
    ctx.fillStyle = "#FFD84D";
    ctx.beginPath(); ctx.arc(fxp+2, GROUND-94, 4, 0, 7); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.7)";
    ctx.beginPath(); ctx.arc(fxp+0.8, GROUND-95.2, 1.4, 0, 7); ctx.fill();
    /* bandera ondeando */
    const wv = Math.sin(ticks*0.09)*3, wv2 = Math.sin(ticks*0.09+1.2)*3;
    g = ctx.createLinearGradient(fxp-30,0,fxp,0);
    g.addColorStop(0,"#C22823"); g.addColorStop(1,"#FF5A50");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(fxp, GROUND-90);
    ctx.quadraticCurveTo(fxp-16, GROUND-92+wv, fxp-30, GROUND-88+wv2);
    ctx.quadraticCurveTo(fxp-26, GROUND-80+wv, fxp-30, GROUND-70+wv2);
    ctx.quadraticCurveTo(fxp-16, GROUND-74+wv, fxp, GROUND-72);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.22)";
    ctx.beginPath();
    ctx.moveTo(fxp, GROUND-90);
    ctx.quadraticCurveTo(fxp-16, GROUND-92+wv, fxp-30, GROUND-88+wv2);
    ctx.quadraticCurveTo(fxp-20, GROUND-84+wv, fxp, GROUND-84);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "7px 'Press Start 2P', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
    ctx.fillText("ZIV", fxp-15, GROUND-77+wv*0.4);
  }
  function drawCoin(c){
    if(c.got) return;
    const spin = Math.cos(ticks*0.09 + c.x);
    const w = Math.max(1.6, 9*Math.abs(spin));
    const cx = c.x+5, cy = c.y+6 + Math.sin(ticks*0.07+c.x)*1.6;
    /* glow */
    const gl = ctx.createRadialGradient(cx,cy,2, cx,cy,16);
    gl.addColorStop(0,"rgba(255,214,60,.4)"); gl.addColorStop(1,"rgba(255,214,60,0)");
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(cx,cy,16,0,7); ctx.fill();
    /* disco girando */
    let g = ctx.createLinearGradient(cx-w, cy-8, cx+w, cy+8);
    if(spin >= 0){ g.addColorStop(0,"#FFF3B0"); g.addColorStop(.5,"#FFD400"); g.addColorStop(1,"#DB9A00"); }
    else { g.addColorStop(0,"#E5B200"); g.addColorStop(1,"#B07C00"); }
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.8, 8, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = "rgba(140,90,0,.8)"; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.8, 8, 0, 0, 7); ctx.stroke();
    if(Math.abs(spin) > 0.55){
      ctx.strokeStyle = "rgba(140,90,0,.55)"; ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.ellipse(cx, cy, w*0.48, 5.4, 0, 0, 7); ctx.stroke();
    }
    /* destello */
    const tw = (Math.sin(ticks*0.2+c.x)*0.5+0.5);
    ctx.fillStyle = "rgba(255,255,255," + (0.4+tw*0.5) + ")";
    ctx.beginPath();
    ctx.moveTo(cx+4, cy-7.5); ctx.lineTo(cx+5.2, cy-5.6); ctx.lineTo(cx+7, cy-4.8);
    ctx.lineTo(cx+5.2, cy-4); ctx.lineTo(cx+4, cy-2); ctx.lineTo(cx+2.8, cy-4);
    ctx.lineTo(cx+1, cy-4.8); ctx.lineTo(cx+2.8, cy-5.6);
    ctx.closePath(); ctx.fill();
  }
  function drawSnail(){
    drawSnailHD(ctx, snail.x, GROUND, snail.dir, ticks);
    if(Math.floor(ticks/40)%2===0){
      otext("SITIO LENTO", snail.x + 10, GROUND - 20, "#fff", 5, 2);
    }
  }
  function drawScene(){
    drawSky();
    drawMountains();
    const t1 = (ticks*0.12)%(W+80), t2 = (ticks*0.26)%(W+80), t3 = (ticks*0.42)%(W+80);
    drawCloud(W - t1, 24, 0.7);
    drawCloud(W - t2 + 150, 52, 1);
    drawCloud(W - t3 + 300, 36, 1.25);
    drawHill(-30,150,46,"#1E9E2C");
    drawHill(W*0.60,130,32,"#26B535");
    drawGround();
    drawFlag();
    blocks.forEach(drawBlock);
    coins.forEach(drawCoin);
    drawSnail();
    if(shroom.active && (state==="PLAY" || state==="FROZEN")){
      drawOrbe(ctx, shroom.x, shroom.y, ticks);
    }
    if(finaleShroom) drawOrbe(ctx, finaleShroom.x, finaleShroom.y, ticks);
    if(player.visible){
      /* sombra suave bajo los pies */
      const airH = Math.max(0, GROUND - (player.y + player.h));
      const sw = Math.max(6, 13 - airH*0.06);
      ctx.fillStyle = "rgba(0,0,0," + Math.max(0.08, 0.3 - airH*0.002) + ")";
      ctx.beginPath();
      ctx.ellipse(player.x + player.w/2, GROUND + 2.5, sw, 3, 0, 0, 7);
      ctx.fill();
      let pose = "idle";
      if(!player.onGround) pose = "jump";
      else if(Math.abs(player.vx) > 0) pose = "walk";
      const sc = player.big ? 3 : S;
      const px = player.x + player.w/2 - (12*sc)/2;
      const py = player.y + player.h - 16*sc;
      drawHero(ctx, px, py, sc, player.facing < 0, pose, ticks);
    }
    fx.draw(ctx);
    // HUD de mejoras
    if(state === "PLAY"){
      ctx.textBaseline = "alphabetic";
      otext(`MEJORAS ${upgrades}/3`, 58, 30, "#FFD400", 8);
      if(upgrades < 3 && Math.floor(ticks/40)%2===0){
        otext("¡GOLPEA LAS CAJAS SORPRESA!", W/2, 50, "#fff", 7);
      }
    }
  }
  function otext(str, x, y, fill, px, weightOutline=3){
    ctx.font = px + "px 'Press Start 2P', monospace";
    ctx.textAlign = "center";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#000"; ctx.lineWidth = weightOutline;
    ctx.strokeText(str, x, y);
    ctx.fillStyle = fill;
    ctx.fillText(str, x, y);
  }
  function tag(str, cx, cy, px, fg="#fff"){
    ctx.font = px + "px 'Press Start 2P', monospace";
    const w = ctx.measureText(str).width + px*2.2;
    const h = px*2.6;
    ctx.fillStyle = "#fff"; ctx.fillRect(cx-w/2+3, cy-h/2+3, w, h);
    ctx.fillStyle = "#000"; ctx.fillRect(cx-w/2, cy-h/2, w, h);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = fg; ctx.fillText(str, cx, cy+1);
    ctx.textBaseline = "alphabetic";
  }
  function drawTitle(){
    drawScene();
    ctx.save();
    ctx.shadowColor = "rgba(0,40,120,.55)"; ctx.shadowBlur = 12;
    otext("SUPER", W/2, H*0.30, "#fff", 20, 5);
    ctx.shadowColor = "rgba(255,170,0,.85)"; ctx.shadowBlur = 16;
    otext("WEB QUEST", W/2, H*0.42, "#FFD400", 20, 5);
    ctx.restore();
    drawHero(ctx, W/2-12, H*0.48, 2, false, "idle", ticks);
    otext("SITIOS LENTOS. LOGOS VIEJOS. CLIENTES PERDIDOS.", W/2, H*0.65, "#fff", 7);
    otext("DESBLOQUEA LAS 3 MEJORAS Y EVOLUCIONA", W/2, H*0.71, "#2EDC6E", 7);

    /* PRESS START — como los juegos de verdad: sin recuadro, solo el
       texto parpadeando. Es la señal que todo el mundo reconoce. */
    if(Math.floor(ticks/26)%2===0){
      otext("PRESS START", W/2, H*0.83, "#FFD400", 13, 5);
    }
    otext(isCoarse ? "TOCA LA PANTALLA" : "PULSA CUALQUIER TECLA",
          W/2, H*0.895, "#9fb4ff", 6);
    otext("© ZIV CREATIVO", W/2, isCoarse ? GROUND - 14 : H*0.955, "#fff", 6);
  }

  function showPowerUp(){
    touch.classList.remove('on');
    overlay.innerHTML = `
      <div class="dialog">
        <h2>🍄 ¡MEJORAS COMPLETAS!</h2>
        <p>✨ Diseño premium · 🔍 SEO · 💬 Chat en vivo<br><br>Tu negocio también puede tener esto.<br>¿Listo para verlo con tu marca?</p>
        <button class="btn blink" id="wStart">▶ QUIERO UNA DEMO GRATUITA</button>
        <p class="proof">${CONFIG.socialProof}</p>
      </div>`;
    pixel("ViewContent", { content_name: "Mejoras completas" });
    overlay.querySelector('#wStart').addEventListener('click', () => {
      audio.blip(); state = "FORM";
      pixel("InitiateCheckout", { content_name: "Empezó el formulario" });
      runForm(overlay, "MUNDO 1 · WEB", [
        { key:"negocio",   label:"¿Cómo se llama tu negocio?",         type:"text",  ph:"Ej. Taquería El Pixel" },
        { key:"giro",      label:"¿A qué se dedica?",                  type:"text",  ph:"Ej. Comida mexicana" },
        { key:"productos", label:"¿Qué productos o servicios ofrece?", type:"text",  ph:"Ej. Tacos, banquetes, envíos" },
        { key:"logo",      label:"¿Tienes logo?",                      type:"radio", opts:["Sí","No"] },
        { key:"dominio",   label:"¿Ya tienes dominio?",                type:"radio", opts:["Sí","No"],
          follow:{ when:"Sí", key:"dominioCual", ph:"¿Cuál es? (ej. minegocio.com)" } },
        { key:"whatsapp",  label:"¿Cuál es tu WhatsApp?",              type:"tel",   ph:"10 dígitos" }
      ], answers => {
        lastAnswers = answers;
        sendToCRM(answers);
        unlock("m1","🍄","¡MISIÓN 1 COMPLETA!","Tu demo web está en camino", 50, 20);
        missionDone("web");
        state = "FINALE";
        finaleShroom = { x: player.x + player.w/2 - 12, y:-24, vy:0 };
      });
    });
  }

  function showFinal(){
    overlay.innerHTML = `
      <div class="dialog">
        <h2>⭐ TU NEGOCIO ACABA DE EVOLUCIONAR</h2>
        <div class="ba">
          <div><b>ANTES</b>Invisible<br>Genérico<br>Sin confianza</div>
          <div class="after"><b>DESPUÉS</b>Premium<br>Profesional<br>Con autoridad</div>
        </div>
        <p>Tu demo está en construcción.<br>Muy pronto nos pondremos en contacto contigo.</p>
        <button class="btn blink" id="wWA">ENVIAR MIS DATOS POR WHATSAPP ▶</button>
        <p class="hint">Se abrirá WhatsApp con tu información lista.</p>
      </div>`;
    overlay.querySelector('#wWA').addEventListener('click', () => {
      audio.power();
      pixel("Contact", { content_name: "WhatsApp desde Web Quest" });
      const a = lastAnswers;
      window.open(waLink("🍄 *¡Nuevo Power-Up! Quiero mi DEMO WEB GRATUITA*", [
        ["Negocio", a.negocio], ["Giro", a.giro], ["Productos/Servicios", a.productos],
        ["¿Tiene logo?", a.logo],
        ["¿Tiene dominio?", (a.dominio||"") + (a.dominioCual ? " ("+a.dominioCual+")" : "")],
        ["WhatsApp", a.whatsapp],
        ["Score del lead", scoreLead(a) + "/100"],
        ["Campaña", campaniaDeLead() || fuenteDeLead()]
      ]), "_blank");
      overlay.innerHTML = "";
      touch.classList.add('on');
    });
  }

  function tick(){
    const [ox, oy] = fx.offset();
    ctx.save();
    ctx.translate(ox, oy);
    if(state === "TITLE"){ ticks++; fx.update(); drawTitle(); ctx.restore(); return; }
    if(state !== "FROZEN" && state !== "FORM") update(); else { ticks++; fx.update(); }
    drawScene();
    ctx.restore();
  }

  return { sec, resize, tick, onAnyKey, playing:()=>state==="PLAY",
           renderOnce(){ ctx.save(); state==="TITLE" ? drawTitle() : drawScene(); ctx.restore(); } };
})();

/* ============================================================
   ORQUESTADOR
   ============================================================ */
const games = { "sec-web": GameWeb };
let activeGame = GameWeb;

function resizeAll(){
  Object.values(games).forEach(g => { g.resize(); g.renderOnce(); });
}
window.addEventListener('resize', resizeAll);
document.addEventListener('fullscreenchange', resizeAll);
resizeAll();

/* Si la fuente pixelada aún no había cargado, el primer dibujado usa una
   fuente genérica y el texto se ve mal. En cuanto llega, redibujamos. */
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(() => {
    document.fonts.load("10px 'Press Start 2P'").then(resizeAll).catch(()=>{});
  });
}

document.getElementById('fsBtn').addEventListener('click', e => {
  e.stopPropagation();
  const el = document.documentElement;
  if(!document.fullscreenElement){
    (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
  }
});

/* Micro-recompensa pasiva */
setInterval(()=>{
  if(activeGame && activeGame.playing && activeGame.playing()) addCoins(1);
}, 20000);

function loop(){
  if(activeGame) activeGame.tick();
  requestAnimationFrame(loop);
}
loop();
